<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magical Flipping Scrapbook 💖</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Sacramento&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <h1>Our Scrapbook 💖</h1>
    <p>Hover on desktop or tap on mobile to flip a memory card!</p>
  </header>

  <main>
    <div class="flip-card">
      <div class="flip-card-inner">
        <div class="flip-card-front">
          <img src="images/memory1.jpg" alt="Beach Day">
          <h2>Beach Day 🏖️</h2>
        </div>
        <div class="flip-card-back">
          <p>That sunny day when we laughed all afternoon on the beach.</p>
          <div class="hearts"></div>
        </div>
      </div>
    </div>

    <div class="flip-card">
      <div class="flip-card-inner">
        <div class="flip-card-front">
          <img src="images/memory2.jpg" alt="Mountain Hike">
          <h2>Mountain Hike ⛰️</h2>
        </div>
        <div class="flip-card-back">
          <p>Our adventure hiking up the mountains together!</p>
          <div class="hearts"></div>
        </div>
      </div>
    </div>

    <div class="flip-card">
      <div class="flip-card-inner">
        <div class="flip-card-front">
          <img src="images/memory3.jpg" alt="Movie Night">
          <h2>Movie Night 🍿</h2>
        </div>
        <div class="flip-card-back">
          <p>Cozy movie nights with popcorn and laughter.</p>
          <div class="hearts"></div>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <p>Made with ❤️ by us</p>
  </footer>
</body>
</html>
